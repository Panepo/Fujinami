encoding_model: cl100k_base
skip_workflows: []

llm:
  api_key: "no-api-key-needed"
  type: openai_chat
  model: qwen3.6:9b
  api_base: http://10.68.129.51:8088/v1
  model_supports_json: true
  max_tokens: 4096
  temperature: 0
  top_p: 1
  n: 1
  request_timeout: 180.0
  max_retries: 10
  max_retry_wait: 10.0
  sleep_on_rate_limit_recommendation: true
  concurrent_requests: 1

parallelization:
  stagger: 0.3
  num_threads: 4

async_mode: threaded

embeddings:
  async_mode: threaded
  llm:
    api_key: "no-api-key-needed"
    type: openai_embedding
    model: locusai/all-minilm-l6-v2:latest
    api_base: http://10.68.129.51:8088/v1
    max_tokens: 8191
    request_timeout: 180.0
    max_retries: 10
    max_retry_wait: 10.0
    sleep_on_rate_limit_recommendation: true
    concurrent_requests: 1
  batch_size: 16
  batch_max_tokens: 8191
  target: required

input:
  type: file
  file_type: text
  base_dir: "../data"
  file_encoding: utf-8
  file_pattern: ".*\\.txt$"

cache:
  type: file
  base_dir: "cache"

storage:
  type: file
  base_dir: "output/artifacts"

reporting:
  type: file
  base_dir: "output/reports"

entity_extraction:
  entity_types: [organization, person, geo, event, concept, technology, product]
  max_gleanings: 1

summarize_descriptions:
  max_length: 500

claim_extraction:
  enabled: false
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 0

community_reports:
  max_length: 2000
  max_input_length: 8000

cluster_graph:
  max_cluster_size: 10

embed_graph:
  enabled: false

umap:
  enabled: false

snapshots:
  graphml: false
  raw_entities: false
  top_level_nodes: false

local_search:
  text_unit_prop: 0.5
  community_prop: 0.1
  conversation_history_max_turns: 5
  top_k_mapped_entities: 10
  top_k_relationships: 10
  max_tokens: 12000

global_search:
  max_tokens: 12000
  data_max_tokens: 12000
  map_max_tokens: 1000
  reduce_max_tokens: 2000
  concurrency: 4
