### GraphRAG 3.x configuration

# Limit to 1 concurrent request for a local Ollama server
concurrent_requests: 1

completion_models:
  default_completion_model:
    model_provider: openai
    model: qwen3.5:9b
    api_base: http://10.68.129.51:8088/v1
    api_key: no-api-key-needed
    auth_method: api_key
    call_args:
      temperature: 0
      top_p: 1
      n: 1
      timeout: 180.0
    retry:
      type: exponential_backoff
      max_retries: 10

embedding_models:
  default_embedding_model:
    model_provider: openai
    model: bge-m3:567m
    api_base: http://10.68.129.51:8088/v1
    api_key: no-api-key-needed
    auth_method: api_key
    call_args:
      timeout: 180.0
    retry:
      type: exponential_backoff
      max_retries: 10

input:
  type: text
  file_pattern: ".*\\.txt$$"

input_storage:
  type: file
  base_dir: "../data"

output_storage:
  type: file
  base_dir: "output"

cache:
  type: none

reporting:
  type: file
  base_dir: "output/reports"

chunking:
  type: tokens
  size: 2000
  overlap: 100

extract_graph:
  completion_model_id: default_completion_model
  entity_types: [organization, person, geo, event, concept, technology, product, process, system]
  max_gleanings: 0

summarize_descriptions:
  completion_model_id: default_completion_model
  max_length: 500

cluster_graph:
  max_cluster_size: 10

extract_claims:
  enabled: false

community_reports:
  completion_model_id: default_completion_model
  max_length: 2000
  max_input_length: 8000

embed_text:
  embedding_model_id: default_embedding_model
  names:
    - text_unit.text
    - entity.description
    - community.full_content

snapshots:
  graphml: false
  embeddings: false

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  text_unit_prop: 0.5
  community_prop: 0.1
  conversation_history_max_turns: 5
  top_k_mapped_entities: 10
  top_k_relationships: 10
  max_tokens: 12000

global_search:
  completion_model_id: default_completion_model
  max_tokens: 12000
  data_max_tokens: 12000
  map_max_tokens: 1000
  reduce_max_tokens: 2000
  concurrency: 4
