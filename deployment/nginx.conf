include /etc/nginx/conf.d/secrets.conf;

server {
    listen 80;
    server_name $server_name;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name $server_name;

    ssl_certificate $ssl_certificate_path;
    ssl_certificate_key $ssl_certificate_key_path;

    location / {
        proxy_pass http://anythingllm:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /etorofu/ {
        proxy_pass http://etorofu:8050/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /docling/ {
        if ($http_authorization != $docling_bearer) {
            add_header WWW-Authenticate "Bearer realm=docling";
            return 401;
        }

        proxy_pass http://docling-serve:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # Token is only used at the gateway and is not forwarded upstream.
        proxy_set_header Authorization "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /ollama/ {
        if ($http_authorization != $ollama_bearer) {
            add_header WWW-Authenticate "Bearer realm=ollama";
            return 401;
        }

        proxy_pass http://ollama:11434/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Token is only used at the gateway and is not forwarded upstream.
        proxy_set_header Authorization "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /fujinami/ {
        proxy_pass http://fujinami:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        client_max_body_size 200m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
